{% extends "base.html" %}
{% set title = "Board" %}

{% block content %}
  <h1>Board</h1>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Time</th>
          <th>Username</th>
          <th>Email</th>
        </tr>
      </thead>
      <tbody>
        {% for log in register_logs %}
          <tr>
            <td>{{ log.time }}</td>
            <td>{{ log.username }}</td>
            <td>{{ log.email }}</td>
          </tr>
        {% else %}
          <tr>
            <td colspan="3">No registered users yet.</td>
          </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
{% endblock %}
